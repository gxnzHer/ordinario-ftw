    <header>
        <h1>Pueblos Mágicos de Veracruz</h1>

    <nav aria-label="Menú principal">

    <main id="hero-registro">
        <section>
            <h2>¡Se parte de nuestra comunidad!</h2>

            <form id="form-registro" action="#" method="POST">

                <div>
                    <label for="usuario">Usuario:</label>
                    <input type="text" id="usuario" name="usuario" required>
                </div>

                <div>
                    <label for="contraseña">Contraseña:</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div>
                    <label for="confirmar-contraseña">Confirmar Contraseña:</label>
                    <input type="password" id="confirmar-password" name="confirmar-password" required>
                </div>

                <div>
                    <input type="checkbox" id="terminos" name="servicios" required>
                    <label for="terminos">Aceptar Términos y Condiciones</label>
                </div>

                <div>
                    <button type="submit" id="btn-registrar">Registrarme</button>
                </div>

            </form>
        </section>
    </main>

    <footer>
